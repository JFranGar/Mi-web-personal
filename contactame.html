<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactame</title>
</head>
<body>
    <header>
        <h1>Contactame</h1>
        <p>Si quieres hablar conmigo llena  el formulario de contacto.</p>
        <img src="img/img1.png" alt="imagen contactame" width="200" title="Contactame">
    </header>
    <main>
    <section>
        <form action="">
            <label for="nombre">Nombre:</label><br>
            <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre!" required>
            <br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
            <br>
            <label for="numero">Numero de telefono (con el formato "+ prefijo de pais + numero"): </label><br>
            <input type="tel" id="numero" name="numero" placeholder="+1 234 567 890" pattern="^\+[0-9]{1,3}[\s\-]?[0-9]{6,14}$" required title="Debe comenzar con + y luego el código de país. Ejemplo: +1 234567890 o +34-912345678">
            <br>
            <label for="mensaje">Mensaje:</label><br>
            <textarea id="mensaje" name="mensaje" required></textarea>
            <br><br>
            <input type="submit" value="Enviar">
            <br><br>
        </form>
    </section>
    </main>
    
    <footer>
        <a href="index.html" title="Picale aqui para regresar a la pagina principal"> <mark>Regresar a la pagina
                principal</mark></a> 
            
    </footer>
</body>
</html>
