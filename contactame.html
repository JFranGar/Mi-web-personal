<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web Personal | Contáctame</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body class="caja-principal">
    <header class="encabezado">
        <div>
            <h1>Contactame</h1>
            <p>Si quieres hablar conmigo llena  el formulario de contacto.</p>
            <img src="img/img1.png" alt="imagen contactame" width="200" title="Contactame">
        </div>
    </header>
    <main class="contenido">
        <section>
            <form action="">
                <div>
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre!" required>
                </div>
                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
                </div>
                <div>
                    <label for="numero">Numero de telefono (con el formato "+ prefijo de pais + numero"): </label>
                    <input type="tel" id="numero" name="numero" placeholder="+1 234 567 890" pattern="^\+[0-9]{1,3}[\s\-]?[0-9]{6,14}$" required title="Debe comenzar con + y luego el código de país. Ejemplo: +1 234567890 o +34-912345678">
                </div>
                <div>
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="6" required></textarea>
                </div>
                <input type="submit" value="Enviar">
            </form>
        </section>
    </main>
    <footer>
        <p><strong>Estoy listo para lo que necesecites!</strong></p>
        <a class="contenido-caja-lista-a" href="index.html" title="Picale aqui para regresar a la pagina principal">Regresar a la pagina principal</a>
        <a class="contenido-caja-lista-a" href="contactame.html" title="Picale aquí para contactarme! >:D">Contáctame</a>
    </footer>
</body>
</html>
